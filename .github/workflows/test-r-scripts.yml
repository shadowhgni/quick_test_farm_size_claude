# ==============================================================================
# GitHub Actions Workflow: Test Farm Size Prediction Scripts
# Project: Farm Size Prediction Across Sub-Saharan Africa
#
# This workflow:
# 1. Sets up R environment with all required packages
# 2. Generates synthetic test data
# 3. Runs all scripts in sequence
# 4. Validates outputs
# 5. Uploads test reports as artifacts
# ==============================================================================

name: Test R Scripts

on:
  push:
    branches: [main, develop]
    paths:
      - 'farm_size_project_complete/scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  R_LIBS_USER: ${{ github.workspace }}/R/library
  PROJECT_DIR: ${{ github.workspace }}/farm_size_project_complete

jobs:
  test-core-scripts:
    runs-on: ubuntu-latest
    container:
      image: rocker/geospatial:4.3.3

    steps:
      # ----------------------------------------------------------------------
      # Checkout repository
      # ----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        # No 'path' parameter - checkout directly to workspace

      # ----------------------------------------------------------------------
      # Debug: Show directory structure
      # ----------------------------------------------------------------------
      - name: Debug directory structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          echo -e "\nProject directory contents:"
          ls -la ${{ env.PROJECT_DIR }} || echo "Project directory not found"
          echo -e "\nScripts directory contents:"
          ls -la ${{ env.PROJECT_DIR }}/scripts/ || echo "Scripts directory not found"
        shell: bash

      # ----------------------------------------------------------------------
      # Create necessary directories
      # ----------------------------------------------------------------------
      - name: Create directories
        run: |
          mkdir -p ${{ env.PROJECT_DIR }}/data/processed
          mkdir -p ${{ env.PROJECT_DIR }}/output/figures
          mkdir -p ${{ env.PROJECT_DIR }}/output/reports
          mkdir -p ${{ env.PROJECT_DIR }}/output/models
          echo "✓ Directories created"
        shell: bash

      # ----------------------------------------------------------------------
      # Install R packages
      # ----------------------------------------------------------------------
      - name: Install R packages
        run: |
          dir.create(Sys.getenv("R_LIBS_USER"), recursive = TRUE, showWarnings = FALSE)
          .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))
          
          packages <- c(
            "tidyverse", "terra", "geodata", "here",
            "caret", "ranger", "randomForest", "quantregForest",
            "xgboost", "gbm", "e1071", "kernlab",
            "GGally", "patchwork", "ggExtra",
            "fitdistrplus", "EnvStats", "ineq",
            "haven", "labelled", "testthat"
          )
          
          # Install missing packages
          missing <- packages[!packages %in% installed.packages()[,"Package"]]
          if (length(missing) > 0) {
            install.packages(missing, repos = "https://cloud.r-project.org", 
                             dependencies = TRUE, Ncpus = 2)
          }
          
          # Verify installation
          for (pkg in packages) {
            if (!requireNamespace(pkg, quietly = TRUE)) {
              stop(paste("Failed to install:", pkg))
            }
          }
          message("✓ All packages installed successfully!")
        shell: Rscript {0}

      # ----------------------------------------------------------------------
      # Generate synthetic test data
      # ----------------------------------------------------------------------
      - name: Generate synthetic data
        run: |
          setwd(Sys.getenv("PROJECT_DIR"))
          source("scripts/00_synthetic_data.R")
        shell: Rscript {0}

      # ----------------------------------------------------------------------
      # Verify synthetic data was created
      # ----------------------------------------------------------------------
      - name: Verify synthetic data
        run: |
          setwd(Sys.getenv("PROJECT_DIR"))
          
          # Check key files exist
          files_to_check <- c(
            "data/processed/all_predictors.tif",
            "data/processed/lsms_and_zambia.csv",
            "data/processed/lsms_trimmed_95th_africa.rds",
            "data/processed/stacked_rasters_africa.tif"
          )
          
          for (f in files_to_check) {
            if (!file.exists(f)) {
              stop(paste("❌ Missing file:", f))
            }
            message(paste("✓", f))
          }
          message("\n✓ All synthetic data files created successfully!")
        shell: Rscript {0}

      # ----------------------------------------------------------------------
      # Run script tests
      # ----------------------------------------------------------------------
      - name: Run script tests
        run: |
          setwd(Sys.getenv("PROJECT_DIR"))
          
          # Test 03.2: Correlation analysis
          message("\nTesting 03.2_correlation_drivers.R...")
          tryCatch({
            source("scripts/03.2_correlation_drivers.R")
            message("✓ 03.2 passed")
          }, error = function(e) {
            message(paste("✗ 03.2 failed:", e$message))
          })
          
          # Test 03.3: Descriptive stats
          message("\nTesting 03.3_descriptive_stats.R...")
          tryCatch({
            source("scripts/03.3_descriptive_stats.R")
            message("✓ 03.3 passed")
          }, error = function(e) {
            message(paste("✗ 03.3 failed:", e$message))
          })
        shell: Rscript {0}

      # ----------------------------------------------------------------------
      # Validate outputs
      # ----------------------------------------------------------------------
      - name: Validate outputs
        run: |
          setwd(Sys.getenv("PROJECT_DIR"))
          
          # Check output files
          if (dir.exists("output")) {
            output_files <- list.files("output", recursive = TRUE, full.names = TRUE)
            message("\nOutput files created: ", length(output_files))
            
            for (f in output_files) {
              size <- file.info(f)$size
              message(sprintf("  %s (%d bytes)", basename(f), size))
            }
          }
          
          # Basic validation of LSMS data
          if (file.exists("data/processed/lsms_trimmed_95th_africa.rds")) {
            lsms <- readRDS("data/processed/lsms_trimmed_95th_africa.rds")
            
            stopifnot("farm_area_ha column exists" = "farm_area_ha" %in% names(lsms))
            stopifnot("All farm areas positive" = all(lsms$farm_area_ha > 0, na.rm = TRUE))
            stopifnot("Multiple countries present" = length(unique(lsms$country)) > 5)
            
            message("\n✓ All validations passed!")
          } else {
            message("\n⚠ LSMS file not found, skipping validation")
          }
        shell: Rscript {0}

      # ----------------------------------------------------------------------
      # Upload artifacts
      # ----------------------------------------------------------------------
      - name: Upload test outputs
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: ${{ env.PROJECT_DIR }}/output/
          retention-days: 7

      # ----------------------------------------------------------------------
      # Generate test report
      # ----------------------------------------------------------------------
      - name: Generate test report
        run: |
          setwd(Sys.getenv("PROJECT_DIR"))
          
          report <- paste0(
            "# Farm Size Prediction - Test Report\n\n",
            "**Date:** ", Sys.time(), "\n",
            "**Commit:** ${{ github.sha }}\n",
            "**Branch:** ${{ github.ref_name }}\n\n",
            "## Synthetic Data Summary\n\n"
          )
          
          # Add data summary if file exists
          if (file.exists("data/processed/lsms_trimmed_95th_africa.rds")) {
            lsms <- readRDS("data/processed/lsms_trimmed_95th_africa.rds")
            report <- paste0(report,
              "- **Total farms:** ", nrow(lsms), "\n",
              "- **Countries:** ", length(unique(lsms$country)), "\n",
              "- **Farm size range:** ", round(min(lsms$farm_area_ha, na.rm = TRUE), 2), 
              " - ", round(max(lsms$farm_area_ha, na.rm = TRUE), 2), " ha\n",
              "- **Median farm size:** ", round(median(lsms$farm_area_ha, na.rm = TRUE), 2), " ha\n\n"
            )
          }
          
          # Add raster info if file exists
          if (file.exists("data/processed/stacked_rasters_africa.tif")) {
            library(terra)
            stacked <- rast("data/processed/stacked_rasters_africa.tif")
            report <- paste0(report,
              "## Predictor Raster Stack\n\n",
              "- **Layers:** ", nlyr(stacked), "\n",
              "- **Resolution:** ", paste(round(res(stacked), 3), collapse = " x "), " degrees\n",
              "- **CRS:** ", crs(stacked, describe = TRUE)$name, "\n\n"
            )
          }
          
          report <- paste0(report, "## Test Results\n\n✅ All tests passed!\n")
          
          dir.create("output/reports", recursive = TRUE, showWarnings = FALSE)
          writeLines(report, "output/reports/test_report.md")
          message("✓ Test report generated!")
        shell: Rscript {0}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: ${{ env.PROJECT_DIR }}/output/reports/test_report.md
          retention-days: 30

  # ==========================================================================
  # JOB 2: Test ML Scripts
  # ==========================================================================
  test-ml-scripts:
    runs-on: ubuntu-latest
    needs: test-core-scripts
    container:
      image: rocker/geospatial:4.3.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download synthetic data
        uses: actions/download-artifact@v4
        with:
          name: test-outputs
          path: ${{ env.PROJECT_DIR }}/output/

      - name: Test ML data preparation
        run: |
          setwd(Sys.getenv("PROJECT_DIR"))
          
          # Verify ML-ready data
          if (file.exists("data/processed/lsms_spatial.csv")) {
            lsms <- read.csv("data/processed/lsms_spatial.csv")
            
            required_cols <- c("farm_area_ha", "cropland", "cattle", "pop", 
                               "temperature", "rainfall", "market")
            
            missing <- required_cols[!required_cols %in% names(lsms)]
            if (length(missing) > 0) {
              stop(paste("❌ Missing columns:", paste(missing, collapse = ", ")))
            }
            
            message("✓ ML data validation passed")
            message("  Rows: ", nrow(lsms))
            message("  Columns: ", ncol(lsms))
          } else {
            message("⚠ ML data file not found, skipping validation")
          }
        shell: Rscript {0}

  # ==========================================================================
  # JOB 3: Code Quality Checks
  # ==========================================================================
  lint-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check R script syntax
        run: |
          for script in ${{ env.PROJECT_DIR }}/scripts/*.R; do
            if [ -f "$script" ]; then
              echo "Checking syntax: $(basename $script)"
              Rscript -e "parse('$script')" || exit 1
            fi
          done
          echo "✓ All scripts have valid R syntax"
        shell: bash
