name: Biomass Trajectory Regression

on:
  push:
    branches: [main, master]
    paths:
      - 'improve_soy_biom_RS_reg/**'   # only fires when THIS folder changes
  workflow_dispatch:
    inputs:
      cv_folds:
        description: 'Spatial CV folds'
        default: '5'
      n_trees:
        description: 'RF trees'
        default: '500'

jobs:
  run-regression:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for the commit-back step

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'improve_soy_biom_RS_reg/requirements.txt'

      - name: Install dependencies
        run: pip install -r improve_soy_biom_RS_reg/requirements.txt

      - name: Check data files
        working-directory: improve_soy_biom_RS_reg
        run: |
          echo "=== Directory contents ==="
          ls -lh
          python3 - << 'EOF'
          import sys
          from pathlib import Path
          missing = []
          for f in ["soybean_fusion_indices_all.csv",
                    "2026-03-02.intermediate_soybean_df.csv",
                    "biomass_trajectory_regression.py"]:
              if not Path(f).exists():
                  # also try .rds
                  if not Path(f).with_suffix('.rds').exists():
                      missing.append(f)
          if missing:
              print(f"MISSING: {missing}")
              sys.exit(1)
          print("All files present.")
          EOF

      - name: Run regression
        working-directory: improve_soy_biom_RS_reg
        run: |
          python3 biomass_trajectory_regression.py \
            --fusion   soybean_fusion_indices_all.csv \
            --biomass  "2026-03-02.intermediate_soybean_df.csv" \
            --cv-folds ${{ github.event.inputs.cv_folds || '5' }} \
            --n-trees  ${{ github.event.inputs.n_trees || '500' }} \
            --outdir   biomass_v5_outputs \
            2>&1 | tee run_log.txt

      - name: Print metrics
        working-directory: improve_soy_biom_RS_reg
        if: always()
        run: |
          echo "================================================"
          echo "  METRICS SUMMARY"
          echo "================================================"
          python3 - << 'EOF'
          import pandas as pd
          from pathlib import Path
          p = Path("biomass_v5_outputs/model_comparison.csv")
          if not p.exists():
              print("model_comparison.csv not found — script likely crashed")
          else:
              df = pd.read_csv(p)
              print(df[["label","MAE","RMSE","R2","RPD"]].to_string(index=False))
              best = df.loc[df["R2"].idxmax()]
              print(f"\n  Best: {best['label']}  R2={best['R2']:.4f}  RMSE={best['RMSE']:.1f}  RPD={best['RPD']:.2f}")
          EOF
          echo ""
          echo "================================================"
          echo "  TOP 20 FEATURES (RF MDI)"
          echo "================================================"
          python3 - << 'EOF'
          import pandas as pd
          from pathlib import Path
          p = Path("biomass_v5_outputs/feature_importance_RF.csv")
          if p.exists():
              print(pd.read_csv(p).head(20).to_string(index=False))
          EOF
          echo ""
          echo "================================================"
          echo "  TOP 15 SHAP FEATURES"
          echo "================================================"
          python3 - << 'EOF'
          import pandas as pd
          from pathlib import Path
          p = Path("biomass_v5_outputs/shap_summary.csv")
          if p.exists():
              print(pd.read_csv(p).head(15).to_string(index=False))
          EOF

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biomass-results-run${{ github.run_number }}
          path: improve_soy_biom_RS_reg/biomass_v5_outputs/
          retention-days: 30
          if-no-files-found: warn

      - name: Commit results
        if: github.event_name == 'push' && success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            improve_soy_biom_RS_reg/biomass_v5_outputs/model_comparison.csv \
            improve_soy_biom_RS_reg/biomass_v5_outputs/predictions.csv \
            improve_soy_biom_RS_reg/biomass_v5_outputs/feature_importance_RF.csv \
            improve_soy_biom_RS_reg/biomass_v5_outputs/feature_importance_XGB.csv \
            improve_soy_biom_RS_reg/biomass_v5_outputs/shap_summary.csv \
            improve_soy_biom_RS_reg/run_log.txt \
            2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "ci: biomass regression run #${{ github.run_number }}" && git push
