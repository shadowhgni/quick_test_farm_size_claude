# ==============================================================================
# GitHub Actions Workflow: Full Pipeline Test
# Project: Farm Size Prediction Across Sub-Saharan Africa
#
# Jobs:
#   1. syntax-check  – parse() all 48 scripts; needs no packages (~2 min)
#   2. full-pipeline – install packages, generate synthetic data, run all scripts
#
# Package strategy:
#   - System GDAL/GEOS/PROJ libs installed via apt
#   - Binary R packages from Posit Public Package Manager (fast, pre-compiled)
#   - pak-based installation with full dependency resolution
#   - Cache keyed on renv.lock + package list hash
# ==============================================================================

name: Test R Scripts

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Job 1: Fast syntax check (no packages needed) ──────────────────────────
  syntax-check:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      - name: Check R script syntax
        run: |
          if [ -d "farm_size_project_complete/scripts" ]; then
            SCRIPTS_DIR="farm_size_project_complete/scripts"
          elif [ -d "scripts" ]; then
            SCRIPTS_DIR="scripts"
          else
            echo "No scripts directory found!"; exit 1
          fi
          FAIL=0
          for script in $SCRIPTS_DIR/*.R; do
            Rscript -e "parse('$script')" > /dev/null 2>&1 || {
              echo "SYNTAX ERROR: $script"
              Rscript -e "parse('$script')"
              FAIL=1
            }
          done
          [ $FAIL -eq 0 ] && echo "✓ All $(ls $SCRIPTS_DIR/*.R | wc -l) scripts pass syntax check"
          exit $FAIL

  # ── Job 2: Full pipeline with packages ─────────────────────────────────────
  full-pipeline:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    needs: syntax-check
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── System libraries required by terra / sf / magick ──────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev libgeos-dev libgeos++-dev \
            libproj-dev \
            libudunits2-dev \
            libmagick++-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff-dev libjpeg-dev \
            libxml2-dev libssl-dev libcurl4-openssl-dev \
            cmake
          sudo ldconfig
          echo "PROJ libs: $(find /usr/lib -name 'libproj.so*' | tr '\n' ' ')"
          echo "GDAL: $(gdal-config --version 2>/dev/null || echo not found)" 

      # ── R setup ────────────────────────────────────────────────────────────
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'
          use-public-rspm: true   # Posit PPM — pre-compiled binaries for Ubuntu

      # ── R package cache ────────────────────────────────────────────────────
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-${{ hashFiles('farm_size_project_complete/renv.lock', '.github/workflows/test-scripts.yml') }}
          restore-keys: |
            r-pkgs-${{ runner.os }}-

      # ── Install all required packages ──────────────────────────────────────
      - name: Install R packages
        run: |
          Rscript -e '
          options(
            repos = c(
              RSPM = "https://packagemanager.posit.co/cran/__linux__/jammy/latest",
              CRAN = "https://cloud.r-project.org"
            ),
            Ncpus = 2L,
            warn = 1L
          )

          safe_install <- function(pkgs) {
            for (p in pkgs) {
              if (!requireNamespace(p, quietly = TRUE)) {
                message("  installing: ", p)
                tryCatch(
                  install.packages(p, dependencies = TRUE, quiet = TRUE),
                  error   = function(e) message("  FAILED  : ", p, " — ", conditionMessage(e)),
                  warning = function(w) message("  WARNING : ", p, " — ", conditionMessage(w))
                )
              } else {
                message("  present : ", p)
              }
            }
          }

          # Install in dependency order — base utilities first
          safe_install(c(
            "remotes", "here",
            "dplyr", "tidyr", "readr", "purrr", "stringr",
            "ggplot2", "tibble", "forcats", "lubridate",
            "tidyverse",
            "haven", "labelled", "readxl", "reshape2",
            "fuzzyjoin", "stringdist",
            "terra", "sf", "spdep", "geodata",
            "randomForest", "ranger", "quantregForest",
            "xgboost", "gbm", "e1071", "kernlab",
            "caret", "doParallel",
            "quantreg", "car", "MASS", "moments",
            "ineq", "fields", "EnvStats", "fitdistrplus",
            "GGally", "patchwork", "ggpubr", "cowplot",
            "viridis", "RColorBrewer", "plotrix", "ggExtra",
            "httr", "curl", "rvest", "R.utils",
            "zip", "XNomial",
            "testthat", "rmarkdown", "knitr"
          ))

          # GitHub-only packages (non-fatal)
          for (gp in c("afrimapr/afrilearndata", "rCarto/SpatialML")) {
            pkg <- sub(".*/", "", gp)
            if (!requireNamespace(pkg, quietly = TRUE)) {
              message("  GitHub  : ", gp)
              tryCatch(
                remotes::install_github(gp, dependencies = TRUE, quiet = TRUE),
                error = function(e) message("  SKIP    : ", gp, " — ", conditionMessage(e))
              )
            }
          }

          # Optional heavy packages (mlr, tuneRanger — large, try last)
          safe_install(c("mlr", "tuneRanger"))

          message("\nDone. Installed packages:")
          print(rownames(installed.packages()))
          '

      # ── Find project directory ─────────────────────────────────────────────
      - name: Find scripts directory
        id: find-scripts
        run: |
          if [ -d "farm_size_project_complete/scripts" ]; then
            echo "scripts_dir=farm_size_project_complete/scripts" >> $GITHUB_OUTPUT
            echo "project_dir=farm_size_project_complete"         >> $GITHUB_OUTPUT
          elif [ -d "scripts" ]; then
            echo "scripts_dir=scripts" >> $GITHUB_OUTPUT
            echo "project_dir=."       >> $GITHUB_OUTPUT
          else
            echo "No scripts directory!"; exit 1
          fi

      # ── Ensure .here anchor exists ─────────────────────────────────────────
      - name: Create .here anchor
        run: touch ${{ steps.find-scripts.outputs.project_dir }}/.here

      # ── Run full pipeline test (always capture output) ───────────────────
      - name: Run full sequential pipeline test
        run: |
          mkdir -p ${{ steps.find-scripts.outputs.project_dir }}/ci-logs
          cd ${{ steps.find-scripts.outputs.scripts_dir }}
          Rscript --vanilla 00_run_all_tests.R             2>&1 | tee ../ci-logs/raw-output.txt || true
        timeout-minutes: 100

      # ── Commit log back so it can be retrieved via git pull ───────────────
      - name: Commit test log to repo
        if: always()
        run: |
          PROJECT="${{ steps.find-scripts.outputs.project_dir }}"
          mkdir -p ${PROJECT}/ci-logs
          # Combine raw output + markdown report into one retrievable file
          {
            echo "# CI Run Log"
            echo "Run: ${{ github.run_id }}  Commit: ${{ github.sha }}  Time: $(date -u)"
            echo ""
            echo "## Raw Output"
            echo '```'
            cat ${PROJECT}/ci-logs/raw-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo ""
            echo "## Pipeline Report"
            cat ${PROJECT}/output/reports/full_pipeline_test_report.md 2>/dev/null || echo "(report not generated)"
          } > ${PROJECT}/ci-logs/latest.md
          git config user.email "ci-bot@farm-size.dev"
          git config user.name "CI Bot"
          git add ${PROJECT}/ci-logs/
          git diff --cached --quiet ||             git commit -m "ci: update test log [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload test artifacts ──────────────────────────────────────────────
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-test-report
          path: |
            **/output/reports/*.md
            **/output/tables/*.csv
          retention-days: 30
